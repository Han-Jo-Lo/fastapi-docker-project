version: "3.9"

services:

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    depends_on:
      - redis
    command: celery -A celery_app:app_celery worker --loglevel=info

  redis:
    image: redis:7
    